<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where to Watch the Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-2">Where to Watch the Game</h1>
            <p class="text-gray-600">Find your team's bar in 4 easy steps • Now in 7 cities!</p>
        </div>

        <!-- Main Content Container -->
        <div id="app" class="bg-white rounded-lg shadow-lg p-6 md:p-8">
            <!-- Step 1: Pick City -->
            <div id="step-city" class="step-container">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Pick Your City</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
                    <button onclick="selectCity('denver')" class="city-card p-6 bg-gradient-to-br from-orange-400 to-blue-600 hover:from-orange-500 hover:to-blue-700 text-white rounded-lg shadow-md transition-all transform hover:scale-105">
                        <div class="text-3xl mb-2">🏔️</div>
                        <div class="text-xl font-bold">Denver</div>
                        <div class="text-sm opacity-90 mt-1">138 bars</div>
                    </button>
                    <button onclick="selectCity('las-vegas')" class="city-card p-6 bg-gradient-to-br from-yellow-400 to-red-600 hover:from-yellow-500 hover:to-red-700 text-white rounded-lg shadow-md transition-all transform hover:scale-105">
                        <div class="text-3xl mb-2">🎰</div>
                        <div class="text-xl font-bold">Las Vegas</div>
                        <div class="text-sm opacity-90 mt-1">61 bars</div>
                    </button>
                    <button onclick="selectCity('orange-county')" class="city-card p-6 bg-gradient-to-br from-blue-400 to-green-600 hover:from-blue-500 hover:to-green-700 text-white rounded-lg shadow-md transition-all transform hover:scale-105">
                        <div class="text-3xl mb-2">🌴</div>
                        <div class="text-xl font-bold">Orange County</div>
                        <div class="text-sm opacity-90 mt-1">80 bars</div>
                    </button>
                    <button onclick="selectCity('phoenix')" class="city-card p-6 bg-gradient-to-br from-yellow-500 to-orange-600 hover:from-yellow-600 hover:to-orange-700 text-white rounded-lg shadow-md transition-all transform hover:scale-105">
                        <div class="text-3xl mb-2">🌵</div>
                        <div class="text-xl font-bold">Phoenix</div>
                        <div class="text-sm opacity-90 mt-1">93 bars</div>
                    </button>
                    <button onclick="selectCity('austin')" class="city-card p-6 bg-gradient-to-br from-purple-400 to-blue-500 hover:from-purple-500 hover:to-blue-600 text-white rounded-lg shadow-md transition-all transform hover:scale-105">
                        <div class="text-3xl mb-2">🤠</div>
                        <div class="text-xl font-bold">Austin</div>
                        <div class="text-sm opacity-90 mt-1">67 bars</div>
                    </button>
                    <button onclick="selectCity('nyc')" class="city-card p-6 bg-gradient-to-br from-gray-700 to-blue-600 hover:from-gray-800 hover:to-blue-700 text-white rounded-lg shadow-md transition-all transform hover:scale-105">
                        <div class="text-3xl mb-2">🗽</div>
                        <div class="text-xl font-bold">New York City</div>
                        <div class="text-sm opacity-90 mt-1">118 bars</div>
                    </button>
                    <button onclick="selectCity('chicago')" class="city-card p-6 bg-gradient-to-br from-blue-500 to-red-600 hover:from-blue-600 hover:to-red-700 text-white rounded-lg shadow-md transition-all transform hover:scale-105">
                        <div class="text-3xl mb-2">🌆</div>
                        <div class="text-xl font-bold">Chicago</div>
                        <div class="text-sm opacity-90 mt-1">83 bars</div>
                    </button>
                </div>
            </div>

            <!-- Step 2: Pick League -->
            <div id="step-league" class="step-container hidden">
                <button onclick="goBack('city')" class="text-blue-600 hover:text-blue-800 mb-4 flex items-center">
                    <span class="mr-2">←</span> Back
                </button>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Pick Your League</h2>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <button onclick="selectLeague('NFL')" class="league-card p-6 bg-green-600 hover:bg-green-700 text-white rounded-lg shadow-md transition-all transform hover:scale-105">
                        <div class="text-4xl mb-2">🏈</div>
                        <div class="text-xl font-bold">NFL</div>
                        <div class="text-sm opacity-90 mt-1" id="nfl-count">0 bars</div>
                    </button>
                    <button onclick="selectLeague('MLB')" class="league-card p-6 bg-red-600 hover:bg-red-700 text-white rounded-lg shadow-md transition-all transform hover:scale-105">
                        <div class="text-4xl mb-2">⚾</div>
                        <div class="text-xl font-bold">MLB</div>
                        <div class="text-sm opacity-90 mt-1" id="mlb-count">0 bars</div>
                    </button>
                    <button onclick="selectLeague('NHL')" class="league-card p-6 bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow-md transition-all transform hover:scale-105">
                        <div class="text-4xl mb-2">🏒</div>
                        <div class="text-xl font-bold">NHL</div>
                        <div class="text-sm opacity-90 mt-1" id="nhl-count">0 bars</div>
                    </button>
                    <button onclick="selectLeague('NBA')" class="league-card p-6 bg-orange-600 hover:bg-orange-700 text-white rounded-lg shadow-md transition-all transform hover:scale-105">
                        <div class="text-4xl mb-2">🏀</div>
                        <div class="text-xl font-bold">NBA</div>
                        <div class="text-sm opacity-90 mt-1" id="nba-count">0 bars</div>
                    </button>
                </div>
            </div>

            <!-- Step 3: Pick Team -->
            <div id="step-team" class="step-container hidden">
                <button onclick="goBack('league')" class="text-blue-600 hover:text-blue-800 mb-4 flex items-center">
                    <span class="mr-2">←</span> Back
                </button>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Pick Your Team</h2>
                <div id="teams-container" class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    <!-- Teams will be populated here -->
                </div>
            </div>

            <!-- Step 4: Show Bars -->
            <div id="step-bars" class="step-container hidden">
                <button onclick="goBack('team')" class="text-blue-600 hover:text-blue-800 mb-4 flex items-center">
                    <span class="mr-2">←</span> Back
                </button>
                <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Bars for <span id="selected-team-name"></span></h2>
                <div id="bars-container" class="space-y-4">
                    <!-- Bars will be populated here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // State
        let state = {
            city: null,
            league: null,
            team: null,
            data: {}
        };

        // Load data
        async function loadData() {
            try {
                const cities = ['denver', 'las-vegas', 'orange-county', 'phoenix', 'austin', 'nyc', 'chicago'];
                for (const city of cities) {
                    const response = await fetch(`./data/${city}.json`);
                    state.data[city] = await response.json();
                }
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        // Navigation
        function showStep(step) {
            document.querySelectorAll('.step-container').forEach(el => el.classList.add('hidden'));
            document.getElementById(`step-${step}`).classList.remove('hidden');
        }

        function goBack(step) {
            if (step === 'city') {
                state = { city: null, league: null, team: null, data: state.data };
                showStep('city');
            } else if (step === 'league') {
                state.league = null;
                state.team = null;
                showLeagueStep();
            } else if (step === 'team') {
                state.team = null;
                showTeamStep();
            }
        }

        // Step 1: City Selection
        function selectCity(city) {
            state.city = city;
            showLeagueStep();
        }

        // Step 2: League Selection
        function showLeagueStep() {
            const cityData = state.data[state.city];
            
            // Update counts
            const sports = cityData.by_sport || {};
            document.getElementById('nfl-count').textContent = `${(sports.NFL || []).length} bars`;
            document.getElementById('mlb-count').textContent = `${(sports.MLB || []).length} bars`;
            document.getElementById('nhl-count').textContent = `${(sports.NHL || []).length} bars`;
            document.getElementById('nba-count').textContent = `${(sports.NBA || []).length} bars`;
            
            showStep('league');
        }

        function selectLeague(league) {
            state.league = league;
            showTeamStep();
        }

        // Step 3: Team Selection
        function showTeamStep() {
            const cityData = state.data[state.city];
            const leagueBars = cityData.by_sport[state.league] || [];
            
            // Get unique teams
            const teamsMap = new Map();
            leagueBars.forEach(bar => {
                bar.teams.forEach(team => {
                    if (!teamsMap.has(team)) {
                        teamsMap.set(team, []);
                    }
                    teamsMap.get(team).push(bar);
                });
            });

            // Sort teams alphabetically
            const sortedTeams = Array.from(teamsMap.entries()).sort((a, b) => a[0].localeCompare(b[0]));

            // Display teams
            const container = document.getElementById('teams-container');
            container.innerHTML = '';
            
            sortedTeams.forEach(([teamName, bars]) => {
                const button = document.createElement('button');
                button.onclick = () => selectTeam(teamName, bars);
                button.className = 'p-4 bg-gray-50 hover:bg-gray-100 border border-gray-200 rounded-lg text-left transition-all transform hover:scale-105';
                button.innerHTML = `
                    <div class="font-bold text-gray-800">${teamName}</div>
                    <div class="text-sm text-gray-600 mt-1">${bars.length} bar${bars.length !== 1 ? 's' : ''}</div>
                `;
                container.appendChild(button);
            });

            showStep('team');
        }

        function selectTeam(teamName, bars) {
            state.team = teamName;
            showBarsStep(teamName, bars);
        }

        // Step 4: Bars Display
        function showBarsStep(teamName, bars) {
            document.getElementById('selected-team-name').textContent = teamName;
            
            const container = document.getElementById('bars-container');
            container.innerHTML = '';

            // Remove duplicates by name
            const uniqueBars = Array.from(
                new Map(bars.map(bar => [bar.name, bar])).values()
            );

            uniqueBars.forEach(bar => {
                const barCard = document.createElement('div');
                barCard.className = 'p-4 bg-gray-50 border border-gray-200 rounded-lg';
                
                let html = `<h3 class="font-bold text-lg text-gray-800 mb-2">${bar.name}</h3>`;
                
                if (bar.address) {
                    html += `<p class="text-sm text-gray-600 mb-1">📍 ${bar.address}</p>`;
                }
                
                if (bar.phone) {
                    html += `<p class="text-sm text-gray-600 mb-1">📞 ${bar.phone}</p>`;
                }
                
                if (bar.website && bar.website !== 'N/A' && bar.website !== '') {
                    const url = bar.website.startsWith('http') ? bar.website : `https://${bar.website}`;
                    html += `<p class="text-sm text-gray-600 mb-1">🌐 <a href="${url}" target="_blank" class="text-blue-600 hover:underline">${bar.website}</a></p>`;
                }
                
                if (bar.notes && bar.notes !== '') {
                    html += `<p class="text-sm text-gray-500 mt-2 italic">${bar.notes}</p>`;
                }
                
                barCard.innerHTML = html;
                container.appendChild(barCard);
            });

            showStep('bars');
        }

        // Initialize
        loadData();
    </script>
</body>
</html>
